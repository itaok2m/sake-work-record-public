<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f4257">
  <title>全体追跡</title>
  <link rel="stylesheet" href="assets/base.css?v=20260612genryolistio">
</head>
<body>
  <div class="tool-nav">
    <a class="back-btn" href="index.html">← トップへ戻る</a>
    <div class="tool-nav-place"><span class="tool-nav-title">全体追跡</span></div>
  </div>
  <main class="tool-body">
    <section class="screen-lead">
      <h1>全体追跡</h1>
    </section>
    <div class="wrapper wide">
      <section class="input-block">
        <h2>追跡対象</h2>
        <div class="form-grid">
          <div class="field"><label>仕込号</label><input id="trace-shikomi" placeholder="仕込号" oninput="loadTrace()"></div>
          <div class="field"><label>用途分類</label><select id="trace-kind" onchange="loadTrace()"><option value="">すべて</option><option>酛麹</option><option>酛掛</option><option>添麹</option><option>仲麹</option><option>留麹</option><option>添掛</option><option>仲掛</option><option>留掛</option><option>四段</option><option>その他</option></select></div>
        </div>
      </section>
      <section class="input-block">
        <h2>原料処理</h2>
        <div id="trace-genryo-list" class="record-list"></div>
      </section>
      <section class="input-block"><h2>工程の流れ</h2><div class="process-flow"><a class="process-node" href="senmai.html"><span class="step-label">入力</span><b>原料処理</b></a><a class="process-node" href="koji.html"><span class="step-label">入力</span><b>麹</b></a><a class="process-node" href="shubo.html"><span class="step-label">入力</span><b>酛</b></a><a class="process-node" href="moromi.html"><span class="step-label">入力</span><b>醪</b></a><a class="process-node future" href="today.html"><span class="step-label">今後</span><b>上槽後</b></a></div></section>
    </div>
  </main>
<script>
const GENRYO_STORAGE_KEY='workRecordGenryoRecordsV1';
function safeReadRecords(){try{const raw=localStorage.getItem(GENRYO_STORAGE_KEY);const parsed=raw?JSON.parse(raw):[];return Array.isArray(parsed)?parsed:[];}catch(_err){return [];}}
function escapeHtml(value){return String(value||'').replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function matches(card){const shikomi=(document.getElementById('trace-shikomi')?.value||'').trim();const kind=document.getElementById('trace-kind')?.value||'';if(shikomi && !String(card.shikomi_no||'').includes(shikomi))return false;if(kind && card.usage_kind!==kind)return false;return true;}
function hasSteamPressure(record){const segs=record.steam&&Array.isArray(record.steam.segments)?record.steam.segments:[];return segs.some(seg=>seg&&(seg.minutes||seg.raw_steam_pressure||seg.dry_steam_pressure));}
function rowHtml(record,card){const steam=record.steam||{};const steamBits=[steam.steaming_time_min?'蒸し時間 '+steam.steaming_time_min+'分':'蒸し時間未計算',hasSteamPressure(record)?'蒸気圧記録あり':'蒸気圧未入力'];return `<div class="record-row trace-row"><b>${escapeHtml(card.usage_kind||'用途未選択')}</b><span>${escapeHtml(card.shikomi_no||'仕込号未入力')} / ${escapeHtml(record.wash_date||'洗米日未入力')} → ${escapeHtml(steam.actual_date||'蒸し実施日未入力')} / ${escapeHtml(card.rice_variety||'品種未入力')} / ${escapeHtml(card.rice_polish?card.rice_polish+'%':'精米未入力')} / ${escapeHtml(card.rice_kg?card.rice_kg+'kg':'kg未入力')} / 検蒸順 ${escapeHtml(card.kenjo_order||'-')} / ${steamBits.map(escapeHtml).join(' / ')}</span><a class="inline-link" href="senmai.html?record_id=${encodeURIComponent(record.record_id)}">編集</a></div>`;}
function loadTrace(){const rows=[];safeReadRecords().forEach(record=>{(record.rice_cards||[]).forEach(card=>{if(matches(card))rows.push(rowHtml(record,card));});});const out=document.getElementById('trace-genryo-list');if(out)out.innerHTML=rows.length?rows.join(''):'<div class="empty-note">表示できる原料処理記録はありません。</div>';}
window.addEventListener('DOMContentLoaded',loadTrace);
</script>
  <script src="assets/ui.js?v=20260612genryolistio" defer></script>
</body>
</html>
