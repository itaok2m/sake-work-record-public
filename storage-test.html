<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>端末内保存テスト</title>
  <style>
    :root{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111;background:#f7f8f5;}
    body{max-width:840px;margin:0 auto;padding:24px 16px;line-height:1.7;}
    h1{font-size:1.35rem;margin:0 0 12px;}
    .box{background:#fff;border:1px solid #d9dfd2;border-radius:12px;padding:16px;margin:12px 0;}
    button{font:inherit;font-weight:700;border:0;border-radius:10px;padding:12px 16px;margin:4px;background:#1f7a45;color:#fff;cursor:pointer;}
    button.secondary{background:#4b5563;}
    button.danger{background:#b42318;}
    code{background:#eef3ea;padding:2px 5px;border-radius:4px;}
    pre{white-space:pre-wrap;background:#111;color:#f5f5f5;border-radius:10px;padding:12px;overflow:auto;}
  </style>
</head>
<body>
  <h1>端末内保存テスト</h1>
  <p>このページは作業記録ツール本体とは無関係の、localStorage保存確認だけを行う単純なテストページです。</p>

  <div class="box">
    <p>保存キー: <code>workRecordStoragePlainTestV1</code></p>
    <button id="saveBtn">300KBテストデータを保存</button>
    <button id="checkBtn" class="secondary">保存状態を確認</button>
    <button id="clearBtn" class="danger">このテストデータだけ削除</button>
  </div>

  <div class="box">
    <strong>結果</strong>
    <pre id="out">未確認</pre>
  </div>

<script>
(function(){
  const KEY='workRecordStoragePlainTestV1';
  const out=document.getElementById('out');
  function report(msg){out.textContent=msg;}
  function inspect(){
    let v=null;
    try{v=localStorage.getItem(KEY);}catch(err){report('localStorage読込エラー: '+err.message);return;}
    if(v===null){report('保存なし\n日時: '+new Date().toISOString()+'\norigin: '+location.origin+'\npath: '+location.pathname);return;}
    report('保存あり\n文字数: '+v.length+'\n先頭: '+v.slice(0,80)+'\n日時: '+new Date().toISOString()+'\norigin: '+location.origin+'\npath: '+location.pathname);
  }
  document.getElementById('saveBtn').addEventListener('click',function(){
    const payload=JSON.stringify({saved_at:new Date().toISOString(),note:'plain localStorage persistence test',data:'x'.repeat(300*1024)});
    try{localStorage.setItem(KEY,payload);inspect();}catch(err){report('localStorage保存エラー: '+err.message);}
  });
  document.getElementById('checkBtn').addEventListener('click',inspect);
  document.getElementById('clearBtn').addEventListener('click',function(){try{localStorage.removeItem(KEY);inspect();}catch(err){report('localStorage削除エラー: '+err.message);}});
  inspect();
})();
</script>
</body>
</html>
