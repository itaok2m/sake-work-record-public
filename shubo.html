<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f4257">
  <title>酛経過</title>
  <link rel="stylesheet" href="assets/base.css?v=20260612genryolistio">
</head>
<body>
  <div class="tool-nav">
    <a class="back-btn" href="flowchart.html">← 工程別記録へ戻る</a>
    <div class="tool-nav-place"><span class="tool-nav-title">酛経過</span></div>
  </div>
  <main class="tool-body">
    <section class="screen-lead">
      <h1>酛経過</h1>
    </section>
    <div class="wrapper wide">
      <section class="input-block"><h2>1. 酛の基本情報</h2><div class="form-grid"><div class="field"><label>BY</label><select><option>R7BY</option><option>R8BY</option></select></div><div class="field"><label>酛番号</label><input placeholder="例：M-77-01"></div><div class="field"><label>開始日</label><input type="date"></div><div class="field"><label>使用先</label><input placeholder="仕込号 / 添仕込など"></div></div></section>
      <section class="input-block"><h2>2. 酛経過入力</h2><div class="rice-card-list"><article class="rice-card"><div class="rice-card-head"><div><h3>日順 1</h3><span class="card-meta">時刻 / 操作 / 品温 / 分析</span></div></div><div class="rice-main-grid"><div class="field compact-field"><label>月日</label><input type="date"></div><div class="field compact-field"><label>時刻</label><input type="time" step="1"></div><div class="field compact-field"><label>操作</label><input placeholder="仕込、荒櫂、暖気など"></div><div class="field compact-field"><label>品温℃</label><input inputmode="decimal"></div><div class="field compact-field"><label>ボーメ</label><input inputmode="decimal"></div><div class="field compact-field"><label>酸度</label><input inputmode="decimal"></div><div class="field compact-field"><label>アミノ酸度</label><input inputmode="decimal"></div><div class="field compact-field"><label>アルコール%</label><input inputmode="decimal"></div><div class="field compact-field memo-field"><label>状貌・メモ</label><textarea placeholder="泡、香り、湧き、追水、暖気操作など"></textarea></div></div></article></div><div class="actions"><button class="btn primary" type="button">日順カードを追加（仮）</button><a class="btn" href="shubo-detail.html">詳細確認へ</a></div></section>
    </div>
  </main>
  <script src="assets/ui.js?v=20260612genryolistio" defer></script>
</body>
</html>
