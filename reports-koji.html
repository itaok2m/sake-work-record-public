<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#2f4257">
  <title>麹製造 出力</title><link rel="stylesheet" href="assets/base.css?v=20260714shubokoji28">
  <style>
    .koji-filter{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;align-items:end}.koji-ledger{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;margin:12px 0}.koji-ledger-head{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:8px}.koji-ledger-head h3{margin:0}.koji-base-table th{width:11%;background:var(--blue-2)}.koji-base-table td{width:14%}.koji-progress-table{min-width:1080px}.koji-progress-table .text-left{text-align:left}.koji-ledger-note{background:var(--yellow-2);border:1px solid rgba(165,106,0,.35);padding:8px;border-radius:10px}.print-title{display:none}
    @media(max-width:720px){.koji-filter{grid-template-columns:1fr}}
    @media print{.screen-lead,.filter-block{display:none!important}.print-title{display:block;text-align:center;margin:0 0 8px}.koji-ledger{page-break-after:always;border:0;padding:0;margin:0;box-shadow:none}.koji-ledger:last-child{page-break-after:auto}.koji-progress-wrap{overflow:visible}.koji-progress-table{min-width:0;font-size:8.5pt}.koji-base-table,.koji-progress-table{width:100%}.koji-base-table th,.koji-base-table td,.koji-progress-table th,.koji-progress-table td{padding:3px}.tool-body{padding:0}.wrapper{max-width:none}}
  </style>
</head>
<body data-page="koji-report">
  <div class="tool-nav"><a class="back-btn" href="flowchart.html">← 工程別記録へ戻る</a><div class="tool-nav-place"><span class="tool-nav-title">麹製造 出力</span></div></div>
  <main class="tool-body">
    <section class="screen-lead"><h1>麹製造 出力</h1><p>表示条件で絞った麹製造台帳を、印刷・PDFまたはExcelへ出力します。</p><div class="actions"><a class="btn" href="koji-check.html">保存済み記録を確認</a><a class="btn" href="koji.html">麹製造を入力</a></div></section>
    <div class="wrapper wide">
      <section class="input-block filter-block"><h2>出力条件</h2><div class="koji-filter">
        <div class="field"><label>BY</label><select id="kr-filter-by" onchange="krRenderReport()"><option value="">すべて</option><option>R7BY</option><option>R8BY</option></select></div>
        <div class="field"><label>用途</label><select id="kr-filter-use" onchange="krRenderReport()"><option value="">すべて</option><option>酛麹</option><option>添麹</option><option>仲麹</option><option>留麹</option><option>四段麹</option><option>その他</option></select></div>
        <div class="field"><label>引込月</label><select id="kr-filter-month" onchange="krRenderReport()"><option value="">すべて</option></select></div>
        <div class="field"><label>記号・使用先・備考</label><input id="kr-filter-q" oninput="krRenderReport()"></div>
        <div class="field"><label>表示順</label><select id="kr-filter-sort" onchange="krRenderReport()"><option value="desc">新しい引込順</option><option value="asc">古い引込順</option></select></div>
      </div><div class="actions no-print"><button class="btn primary" type="button" onclick="krRenderReport()">表示を更新</button><button class="btn" type="button" onclick="krPrint()">表示中を印刷 / PDF</button><button class="btn" type="button" onclick="krExportExcel()">表示中をExcel出力</button><button class="btn" type="button" onclick="krClearFilters()">条件を空にする</button></div><div id="kr-list-status" class="list-status"></div><p class="empty-note">Excelは人が読む資料です。編集してもアプリ内記録には戻りません。正本バックアップは全工程JSONです。</p></section>
      <section class="input-block"><h2 class="print-title">麹製造帳</h2><h2 class="no-print">出力前確認</h2><div id="kr-report-preview"></div></section>
    </div>
  </main>
  <script src="assets/koji-records.js?v=20260714koji28"></script><script src="assets/ui.js?v=20260714koji28" defer></script>
</body></html>
