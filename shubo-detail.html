    <section class="screen-lead"><h1>酒母製造 詳細確認</h1><p>酒母側の操作経過と分析記録を、後段で合成確認するための確認枠です。</p></section>
    <div class="wrapper wide">
      <section class="input-block"><h2>確認対象</h2><div class="form-grid"><div class="field"><label>酒母番号</label><input placeholder="M-77-01"></div><div class="field"><label>表示範囲</label><select><option>全日順</option><option>仕込〜膨れ</option><option>湧付〜使用</option></select></div></div></section>
      <section class="input-block"><h2>読み取り確認</h2><div class="check-list"><div class="check-item"><b>酒母操作経過</b><span class="status draft">薄い実装</span> 酒母製造画面の保存記録を確認対象にします。</div><div class="check-item"><b>分析記録</b><span class="status draft">後段</span> 分析記録の正本から候補参照します。自動同期はしません。</div><div class="check-item"><b>グラフ確認</b><span class="status draft">後段</span> 品温・ボーメ・酸度などを合成表示する予定です。</div></div></section>
