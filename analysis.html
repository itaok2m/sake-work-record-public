<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f4257">
  <title>分析記録</title>
  <link rel="stylesheet" href="assets/base.css?v=20260710independent01">
</head>
<body>
  <div class="tool-nav">
    <a class="back-btn" href="flowchart.html">← 工程別記録へ戻る</a>
    <div class="tool-nav-place"><span class="tool-nav-title">分析記録</span></div>
  </div>
  <main class="tool-body">
    <section class="screen-lead">
      <h1>分析記録</h1>
    </section>
    <div class="wrapper wide">
      <section class="input-block">
        <h2>分析対象</h2>
        <p class="empty-note">この画面の分析記録を正本にします。酒母製造・醪経過・酒類側へは、保存時に自動同期せず、後段で候補取り込みします。</p>
        <div class="form-grid">
          <div class="field"><label>分析日</label><input data-field="分析日" type="date"></div>
          <div class="field"><label>対象工程</label><select data-field="対象工程"><option>酒母</option><option>醪</option><option>酒類</option><option>その他</option></select></div>
          <div class="field"><label>対象ID / 対象名</label><input data-field="対象ID" placeholder="酒母号 / 仕込号 / タンク番号"></div>
          <div class="field"><label>仕込号</label><input data-field="仕込号" placeholder="例：12号"></div>
          <div class="field"><label>T.No</label><input data-field="TNo" placeholder="タンク番号など"></div>
          <div class="field"><label>サンプル種類</label><input data-field="サンプル種類" placeholder="酒母 / 醪 / 製成酒など"></div>
          <div class="field"><label>日数 / 日順</label><input data-field="日数日順" inputmode="numeric"></div>
        </div>
      </section>
      <section class="input-block">
        <h2>分析値</h2>
        <div class="form-grid">
          <div class="field"><label>ボーメ</label><input data-field="ボーメ" inputmode="decimal"></div>
          <div class="field"><label>日本酒度</label><input data-field="日本酒度" inputmode="decimal"></div>
          <div class="field"><label>アルコール %</label><input data-field="アルコール%" inputmode="decimal"></div>
          <div class="field"><label>酸度 ml</label><input data-field="酸度ml" inputmode="decimal"></div>
          <div class="field"><label>アミノ酸度 ml</label><input data-field="アミノ酸度ml" inputmode="decimal"></div>
          <div class="field"><label>グルコース</label><input data-field="グルコース" inputmode="decimal"></div>
          <div class="field"><label>品温 ℃</label><input data-field="品温℃" inputmode="decimal"></div>
          <div class="field"><label>室温 / 気温 ℃</label><input data-field="室温気温℃" inputmode="decimal"></div>
        </div>
      </section>
      <section class="input-block">
        <h2>採取・処分</h2>
        <div class="form-grid">
          <div class="field"><label>採取量</label><input data-field="採取量" inputmode="decimal"></div>
          <div class="field"><label>使用量</label><input data-field="使用量" inputmode="decimal"></div>
          <div class="field"><label>廃棄量</label><input data-field="廃棄量" inputmode="decimal"></div>
          <div class="field memo-field"><label>処分内容・備考</label><textarea data-field="備考" placeholder="処分内容、分析メモ、異常、再測定など"></textarea></div>
        </div>
        <div class="actions"><button class="btn primary" type="button" onclick="saveRecord()">分析記録を保存</button><button class="btn" type="button" onclick="clearForm()">入力欄を空にする</button></div>
        <div id="record-status" class="list-status"></div>
      </section>
      <section class="input-block"><h2>保存済み分析記録</h2><div id="record-count" class="list-status"></div><div id="saved-records" class="check-list"></div></section>
    </div>
  </main>
  <script>window.WORK_RECORD_PAGE={"process": "analysis", "label": "分析記録", "storageKey": "workRecordAnalysisRecordsV1", "idPrefix": "analysis", "titleFields": ["対象ID", "仕込号", "TNo"], "dateFields": ["分析日"], "summaryFields": ["対象工程", "ボーメ", "日本酒度", "アルコール%", "酸度ml"]};</script>
  <script>
const RECORD_KEY=window.WORK_RECORD_PAGE.storageKey;
const RECORD_LABEL=window.WORK_RECORD_PAGE.label;
function escapeHtml(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function nowIso(){return new Date().toISOString();}
function compactId(){return Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);}
function readRecords(){try{const raw=localStorage.getItem(RECORD_KEY);const parsed=raw?JSON.parse(raw):[];return Array.isArray(parsed)?parsed:[];}catch(_err){return [];}}
function writeRecords(records){localStorage.setItem(RECORD_KEY,JSON.stringify(records));}
function fieldValue(name){const el=document.querySelector(`[data-field="${name}"]`);return el?String(el.value||'').trim():'';}
function setStatus(text){const el=document.getElementById('record-status');if(el)el.textContent=text;}
function collectRecord(){const fields={};document.querySelectorAll('[data-field]').forEach(el=>{fields[el.dataset.field]=String(el.value||'').trim();});return {record_id:window.WORK_RECORD_PAGE.idPrefix+'_'+compactId(),schema:'workRecordThinRecordV01',process:window.WORK_RECORD_PAGE.process,label:RECORD_LABEL,created_at:nowIso(),updated_at:nowIso(),fields,candidate_imports:[],notes:'薄い実装。候補取り込み・グラフ・帳票は次段階。'};}
function saveRecord(){try{const records=readRecords();const next=collectRecord();records.unshift(next);writeRecords(records);setStatus(`${RECORD_LABEL}を保存しました。端末内保存 ${records.length}件。正本化は全工程バックアップJSONで行います。`);renderRecords();}catch(err){alert('保存できませんでした。'+(err&&err.message?'\n'+err.message:''));}}
function clearForm(){document.querySelectorAll('[data-field]').forEach(el=>{el.value='';});setStatus('入力欄を空にしました。保存済み記録は消していません。');}
function primaryValue(record,names){for(const name of names){const value=record.fields&&record.fields[name];if(value)return value;}return '未入力';}
function renderRecords(){const records=readRecords();const list=document.getElementById('saved-records');if(!list)return;const rows=records.slice(0,20).map(record=>{const title=primaryValue(record,window.WORK_RECORD_PAGE.titleFields||[]);const date=primaryValue(record,window.WORK_RECORD_PAGE.dateFields||[]);const meta=(record.updated_at||record.created_at||'').replace('T',' ').slice(0,16);const summary=window.WORK_RECORD_PAGE.summaryFields.map(name=>`${name}: ${record.fields?.[name]||'未入力'}`).join(' / ');return `<div class="check-item"><b>${escapeHtml(title)}</b><span class="status draft">端末内</span> ${escapeHtml(date)}<br><small>${escapeHtml(summary)} / 更新 ${escapeHtml(meta)}</small></div>`;}).join('');list.innerHTML=rows||'<div class="empty-note">保存済み記録はまだありません。</div>';const count=document.getElementById('record-count');if(count)count.textContent=`端末内保存 ${records.length}件`;}
document.addEventListener('DOMContentLoaded',()=>{renderRecords();});
</script>
  <script src="assets/ui.js?v=20260710independent01" defer></script>
</body>
</html>
